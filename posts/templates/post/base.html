{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteWave</title>
    <link rel="stylesheet" href="{%static 'post/main.css'%}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="/">
                <img class="logo" src="{%static 'post/logo.png'%}" alt="MyBlog logo">
            </a>
        </div>
        
        <ul class="navbar-link">
            <li>
                <a href="{% url 'home'%}" class="{%if request.path == '/'%}active{% endif %}">Home</a>
            </li>

            {% if user.is_authenticated %}
            <li>
                <a href="{% url 'blogpost'%}" class="{%if request.path == '/blogpost'%}active{% endif %}">My Blogposts</a>
            </li>

            <li>
                <a href="{% url 'profile'%}" class="{%if request.path == '/users/profile'%}active{% endif %}">Signed in as : {{user.username}}</a>
            </li>

            <li>
                <a href="{%url 'logoutconfirm' %}" class="{%if request.path == 'users/confirm/logout'%}active{% endif %}">Logout</a>
            </li>

            {% else %}

            <li>
                <a href="{% url 'signup'%}" class="{%if request.path == '/users/signup'%}active{% endif %}">Signup</a>
            </li>

            <li>
                <a href="{% url 'login'%}" class="{%if request.path == '/users/login'%}active{% endif %}">Login</a>
            </li>

            {% endif %}
        </ul>
    </nav>
    <div class="container">
        {%block content%}
        {%endblock%}
    </div>
</body>
</html>
