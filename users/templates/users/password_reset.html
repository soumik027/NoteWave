{% extends "post/base.html"%}
{%load crispy_forms_tags%}

{% block content%}

   <div class="main-container">
        <div class="topbar">
            <h1 class="title">Enter email for password Reset</h1>
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="btn btn-primary submit-btn">Submit reset email</button>
        </form> 
    </div>
{%endblock%}
